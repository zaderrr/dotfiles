background {
    monitor =
    path = $HOME/.config/hypr/wallpapers/bg3.jpg
    blur_passes = 2
}
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

label {
    monitor =
     text = cmd[update:1000] echo "$(date +"%-H:%M")"
    color = rgba(255, 255, 255,.75)
    font_size = 120
    font_family = monospace
    position = 0, -140
    halign = center
    valign = top
}

# DAY-DATE-MONTH
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date '+%A, %d %B')</span>"
    color = rgba(225, 225, 225, 0.75)
    font_size = 25
    font_family = monospace
    font_weight = black
    position = 0, 380
    halign = center
    valign = center
}



# USER
label {
    monitor =
    text =   
    color = rgba(255, 255, 255, .65)
    font_size = 25
    font_family = monospace
    position = 0, 70
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 290, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(60, 56, 54, 0.35)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = monospace 
    placeholder_text = <i><span foreground="##ffffff99"></span></i>
    hide_input = false
    halign = center
    valign = center
}


